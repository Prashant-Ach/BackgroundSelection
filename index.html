<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Background & Texture Studio</title>
<script src="https://cdn.jsdelivr.net/npm/simplex-noise@4.0.1/dist/cjs/simplex-noise.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b10;--s1:#111118;--s2:#18181f;--s3:#21212b;
  --border:#2a2a38;--border2:#363650;
  --accent:#6366f1;--accent2:#ec4899;--accent3:#06b6d4;
  --green:#22c55e;--yellow:#f59e0b;--red:#ef4444;
  --text:#e4e4f0;--muted:#6b6b8a;--muted2:#4a4a62;
  --radius:8px;--r2:12px;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:var(--bg);color:var(--text)}

/* ── LAYOUT ── */
#app{display:grid;grid-template-columns:220px 1fr 260px;grid-template-rows:48px 1fr;height:100vh;overflow:hidden}
#topbar{grid-column:1/-1;display:flex;align-items:center;gap:12px;padding:0 16px;background:var(--s1);border-bottom:1px solid var(--border);z-index:10}
#left-panel{grid-column:1;background:var(--s1);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
#canvas-area{grid-column:2;background:repeating-conic-gradient(#14141e 0% 25%,var(--bg) 0% 50%) 0 0/20px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
#right-panel{grid-column:3;background:var(--s1);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.logo{font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.tb-sep{flex:1}
.tb-btn{background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:5px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all.15s;white-space:nowrap}
.tb-btn:hover{border-color:var(--accent);color:var(--accent)}
.tb-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-weight:600}
.tb-btn.primary:hover{opacity:.85}
#canvas-size-sel{background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:5px 8px;font-size:12px;outline:none}
#canvas-size-sel:focus{border-color:var(--accent)}

/* ── LEFT NAV ── */
.nav-section{padding:10px 10px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2)}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;border-radius:6px;margin:1px 6px;font-size:12.5px;color:var(--muted);transition:all.12s}
.nav-item:hover{background:var(--s3);color:var(--text)}
.nav-item.active{background:#6366f118;color:var(--accent);font-weight:600}
.nav-item .icon{font-size:14px;width:18px;text-align:center}
.nav-divider{height:1px;background:var(--border);margin:6px 12px}

/* ── CANVAS ── */
#main-canvas{border-radius:var(--r2);box-shadow:0 20px 60px #00000060;display:block;cursor:crosshair;max-width:calc(100vw - 500px);max-height:calc(100vh - 100px)}
#canvas-overlay{position:absolute;border-radius:var(--r2);pointer-events:none;top:50%;left:50%;transform:translate(-50%,-50%)}
.canvas-toolbar{position:absolute;bottom:16px;display:flex;gap:8px}
.canvas-toolbar .tb-btn{background:#0008;backdrop-filter:blur(8px);border-color:#fff2}

/* ── RIGHT PANEL ── */
.rp-header{padding:12px 14px 8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.rp-section{padding:10px 12px;border-bottom:1px solid var(--border)}
.rp-title{font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.ctrl{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.ctrl label{font-size:11.5px;color:var(--muted);display:flex;justify-content:space-between}
.ctrl label span{color:var(--text);font-weight:600}
input[type=range]{width:100%;height:4px;accent-color:var(--accent);cursor:pointer;border-radius:2px}
select,input[type=text],input[type=number]{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 8px;font-size:12px;outline:none;transition:border-color.15s}
select:focus,input[type=text]:focus,input[type=number]:focus{border-color:var(--accent)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}

/* color swatch grid */
.color-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.cswatch{width:28px;height:28px;border-radius:5px;border:2px solid transparent;cursor:pointer;transition:all.12s;position:relative}
.cswatch:hover,.cswatch.active{border-color:#fff;transform:scale(1.12)}
.cswatch input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.color-picker-wrap{position:relative;width:28px;height:28px}
.color-preview{width:28px;height:28px;border-radius:5px;border:2px solid var(--border);cursor:pointer;transition:all.12s}
.color-preview:hover{border-color:var(--accent)}

/* tabs */
.tabs{display:flex;gap:2px;padding:8px 10px 0}
.tab{padding:5px 10px;border-radius:6px 6px 0 0;font-size:11.5px;cursor:pointer;color:var(--muted);transition:all.12s;border:1px solid transparent;border-bottom:none}
.tab:hover{color:var(--text)}
.tab.active{background:var(--s2);color:var(--text);border-color:var(--border)}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:7px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--s2);color:var(--text);font-size:12px;cursor:pointer;transition:all.15s;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.sm{padding:4px 9px;font-size:11px}
.btn.active{background:#6366f118;border-color:var(--accent);color:var(--accent)}
.btn-group{display:flex;gap:4px;flex-wrap:wrap}
.btn-full{width:100%;justify-content:center}
.btn-grad{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-weight:600}
.btn-grad:hover{opacity:.85;color:#fff}

/* presets */
.preset-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:10px 12px}
.preset-item{border-radius:var(--radius);overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all.15s;aspect-ratio:16/9;position:relative}
.preset-item:hover,.preset-item.active{border-color:var(--accent)}
.preset-item canvas,.preset-item div{width:100%;height:100%}
.preset-label{position:absolute;bottom:0;left:0;right:0;background:#000a;font-size:9px;color:#fff;padding:2px 4px;text-align:center}

/* history strip */
#history-strip{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;border-top:1px solid var(--border)}
#history-strip::-webkit-scrollbar{height:4px}
#history-strip::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.hist-thumb{flex-shrink:0;width:56px;height:36px;border-radius:5px;border:2px solid transparent;cursor:pointer;overflow:hidden;transition:all.12s}
.hist-thumb:hover,.hist-thumb.active{border-color:var(--accent)}
.hist-thumb img{width:100%;height:100%;object-fit:cover}

/* reference upload */
#ref-drop{border:2px dashed var(--border2);border-radius:var(--r2);padding:20px;text-align:center;cursor:pointer;transition:all.2s;margin:10px 12px}
#ref-drop:hover,#ref-drop.drag{border-color:var(--accent);background:#6366f108}
#ref-drop .icon{font-size:28px;margin-bottom:6px}
#ref-drop p{font-size:11.5px;color:var(--muted)}
.palette-strip{display:flex;gap:4px;margin:8px 12px}
.pal-color{flex:1;height:32px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:all.12s;position:relative}
.pal-color:hover,.pal-color.used{border-color:#fff;transform:scaleY(1.08)}
.pal-color .hex-tip{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--muted);white-space:nowrap;display:none}
.pal-color:hover .hex-tip{display:block}
.style-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;background:#6366f120;color:var(--accent);border:1px solid #6366f140}

/* variations grid */
#var-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:10px 12px}
.var-thumb{border-radius:var(--radius);overflow:hidden;cursor:pointer;border:2px solid transparent;aspect-ratio:16/9;transition:all.15s}
.var-thumb:hover{border-color:var(--accent)}

/* overlays / safe zones */
.safe-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;border-radius:var(--r2);overflow:hidden}

/* accessibility badges */
.a11y-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700}
.a11y-badge.pass-aaa{background:#22c55e20;color:var(--green);border:1px solid #22c55e40}
.a11y-badge.pass-aa{background:#f59e0b20;color:var(--yellow);border:1px solid #f59e0b40}
.a11y-badge.fail{background:#ef444420;color:var(--red);border:1px solid #ef444440}
.a11y-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.a11y-swatch{width:16px;height:16px;border-radius:3px;border:1px solid #fff2}

/* export panel */
.export-code{background:var(--s3);border:1px solid var(--border);border-radius:6px;padding:8px;font-family:monospace;font-size:10.5px;color:#a5b4fc;overflow-x:auto;white-space:pre;max-height:80px;overflow-y:auto;margin-top:4px}

/* toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(50px);background:var(--s3);border:1px solid var(--border2);color:var(--text);padding:8px 18px;border-radius:8px;font-size:12.5px;z-index:999;transition:transform.25s;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}

/* scrollbar */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── AI PROMPT BAR ─────────────────────────────────────────── */
#ai-bar{position:absolute;bottom:56px;left:50%;transform:translateX(-50%);width:min(640px,calc(100% - 40px));z-index:20;pointer-events:all}
#ai-suggestions{display:flex;gap:6px;justify-content:center;margin-bottom:8px;flex-wrap:wrap}
.ai-chip{padding:4px 11px;border-radius:20px;background:#0d0d1acc;border:1px solid #ffffff18;color:var(--text);font-size:11px;cursor:pointer;transition:all.15s;backdrop-filter:blur(12px);white-space:nowrap;user-select:none}
.ai-chip:hover{background:var(--accent);border-color:var(--accent);color:#fff;transform:translateY(-1px)}
.ai-chip.cop{background:#ec489912;border-color:#ec489930;color:#ec4899}
.ai-chip.cop:hover{background:#ec4899;border-color:#ec4899;color:#fff}
#ai-input-row{display:flex;gap:8px;align-items:center}
#ai-prompt{flex:1;background:#08080fdd;border:1px solid #ffffff1e;border-radius:14px;color:var(--text);padding:11px 16px 11px 42px;font-size:13px;outline:none;backdrop-filter:blur(20px);transition:border-color.2s,box-shadow.2s;font-family:inherit}
#ai-prompt:focus{border-color:var(--accent);box-shadow:0 0 0 3px #6366f120}
#ai-prompt::placeholder{color:var(--muted2)}
#ai-prompt-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;color:var(--accent);opacity:.8}
#ai-prompt-wrap{position:relative;flex:1;display:flex;align-items:center}
#ai-send{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all.15s;flex-shrink:0;box-shadow:0 4px 15px #6366f140}
#ai-send:hover{opacity:.88;transform:scale(1.06) translateY(-1px)}
#ai-send.spin{animation:ai-spin .5s linear infinite}
@keyframes ai-spin{to{transform:rotate(360deg)}}
#ai-status{text-align:center;font-size:11px;color:var(--muted);margin-top:6px;min-height:15px;transition:all.3s}
.ai-thinking{color:var(--accent)!important;animation:ai-pulse 1s ease-in-out infinite}
@keyframes ai-pulse{0%,100%{opacity:.4}50%{opacity:1}}
#ai-result{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:#08080fee;border:1px solid #6366f150;border-radius:10px;padding:5px 14px;font-size:11.5px;color:var(--accent);backdrop-filter:blur(12px);white-space:nowrap;opacity:0;transition:opacity.3s;pointer-events:none;z-index:30;display:flex;align-items:center;gap:6px}
#ai-result.show{opacity:1}
/* autocomplete dropdown */
#ai-autocomplete{position:absolute;bottom:calc(100% + 8px);left:0;right:52px;background:#0e0e1a;border:1px solid var(--border2);border-radius:10px;overflow:hidden;display:none;z-index:25}
.ai-ac-item{padding:9px 14px;font-size:12px;color:var(--muted);cursor:pointer;transition:all.12s;border-bottom:1px solid var(--border)}
.ai-ac-item:last-child{border-bottom:none}
.ai-ac-item:hover,.ai-ac-item.sel{background:var(--s3);color:var(--text)}
.ai-ac-item span{color:var(--accent);margin-right:8px}

/* toggle switch */
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.toggle{width:34px;height:18px;background:var(--s3);border-radius:10px;border:1px solid var(--border);cursor:pointer;position:relative;transition:background.2s}
.toggle.on{background:var(--accent);border-color:var(--accent)}
.toggle::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform.2s}
.toggle.on::after{transform:translateX(16px)}
.toggle-label{font-size:12px;color:var(--muted)}

/* tiling preview */
#tile-preview-wrap{position:relative;overflow:hidden;border-radius:var(--r2);background:var(--s3);border:1px solid var(--border)}
</style>
</head>
<body>
<div id="app">

<!-- ── TOPBAR ── -->
<div id="topbar">
  <div class="logo">⬡ BG Studio</div>
  <select id="canvas-size-sel">
    <option value="1200,630">OG Image (1200×630)</option>
    <option value="1920,1080">HD Wallpaper (1920×1080)</option>
    <option value="1080,1920">Mobile Wallpaper (1080×1920)</option>
    <option value="1024,500">App Store (1024×500)</option>
    <option value="1500,500">Twitter Header (1500×500)</option>
    <option value="820,312">Facebook Cover (820×312)</option>
    <option value="1080,1080">Instagram Square (1080×1080)</option>
    <option value="1584,396">LinkedIn Banner (1584×396)</option>
    <option value="800,800">Custom Square</option>
  </select>
  <button class="tb-btn" id="btn-shuffle" title="Random variation">🔀 Shuffle</button>
  <button class="tb-btn" id="btn-variations">⊞ Variations</button>
  <button class="tb-btn" id="btn-safeZone">📐 Safe Zones</button>
  <button class="tb-btn" id="btn-tilePreview">⊞ Tile</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-copyCSS">📋 CSS</button>
  <button class="tb-btn" id="btn-copySVG">📄 SVG</button>
  <button class="tb-btn primary" id="btn-export">⬇ Export PNG</button>
</div>

<!-- ── LEFT NAV ── -->
<div id="left-panel">
  <div class="nav-section">Generators</div>
  <div class="nav-item active" data-gen="gradient"><span class="icon">🌈</span>Gradient</div>
  <div class="nav-item" data-gen="geometric"><span class="icon">⬡</span>Geometric</div>
  <div class="nav-item" data-gen="noise"><span class="icon">☁</span>Noise & Organic</div>
  <div class="nav-item" data-gen="flowfield"><span class="icon">〜</span>Flow Fields</div>
  <div class="nav-item" data-gen="material"><span class="icon">◈</span>Materials</div>
  <div class="nav-divider"></div>
  <div class="nav-section">Tools</div>
  <div class="nav-item" data-gen="reference"><span class="icon">🖼</span>Reference Image</div>
  <div class="nav-item" data-gen="presets"><span class="icon">★</span>Presets</div>
  <div class="nav-divider"></div>
  <div class="nav-section">History</div>
  <div id="history-strip"></div>
</div>

<!-- ── CENTER CANVAS ── -->
<div id="canvas-area">
  <canvas id="main-canvas" width="1200" height="630"></canvas>
  <canvas id="overlay-canvas" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;border-radius:12px;display:none"></canvas>
  <!-- AI RESULT BADGE -->
  <div id="ai-result"><span id="ai-result-icon">✦</span><span id="ai-result-text"></span></div>

  <!-- AI PROMPT BAR -->
  <div id="ai-bar">
    <div id="ai-suggestions">
      <span class="ai-chip" data-prompt="dark magic blue blur abstract background vignette art">✦ Magic Blue</span>
      <span class="ai-chip" data-prompt="dark fintech dashboard premium indigo purple mesh gradient">💼 Fintech</span>
      <span class="ai-chip" data-prompt="vibrant mobile mesh gradient purple pink abstract">📱 Mobile</span>
      <span class="ai-chip" data-prompt="cosmic dark purple nebula space glow abstract">🌌 Cosmic</span>
      <span class="ai-chip" data-prompt="aurora green teal northern lights dark glow">🌌 Aurora</span>
      <span class="ai-chip" data-prompt="neon cyan electric dark cyberpunk glow abstract">⚡ Neon</span>
      <span class="ai-chip" data-prompt="minimal saas landing clean blue gradient subtle">🚀 SaaS</span>
      <span class="ai-chip" data-prompt="warm gold luxury dark spotlight hero elegant">✨ Luxury</span>
    </div>
    <div id="ai-input-row">
      <div id="ai-prompt-wrap">
        <span id="ai-prompt-icon">✦</span>
        <input id="ai-prompt" type="text" autocomplete="off" spellcheck="false"
          placeholder="Describe your background… e.g. dark fintech dashboard with purple gradient"/>
        <div id="ai-autocomplete"></div>
      </div>
      <button id="ai-send" title="Generate (Enter)">➤</button>
    </div>
    <div id="ai-status"></div>
  </div>

  <div class="canvas-toolbar">
    <button class="tb-btn" id="btn-zoomFit">⊡ Fit</button>
    <button class="tb-btn" id="btn-realtime" title="Real-time update">⚡ Live</button>
  </div>
</div>

<!-- ── RIGHT PANEL ── -->
<div id="right-panel">
  <div class="rp-header">
    <span id="rp-title">Gradient</span>
    <button class="btn sm" id="btn-generate">▶ Render</button>
  </div>
  <div id="controls-area"></div>
  <div style="padding:10px 12px;border-top:1px solid var(--border);margin-top:auto">
    <div class="rp-title">Accessibility</div>
    <div id="a11y-area"></div>
    <div style="margin-top:8px">
      <div class="rp-title">Export Code</div>
      <div class="export-code" id="css-output">/* Generate to see CSS */</div>
      <button class="btn btn-full" style="margin-top:6px" id="btn-copyCSSBottom">📋 Copy CSS</button>
    </div>
  </div>
</div>
</div>

<div id="toast"></div>
<!-- hidden canvas for reference image analysis -->
<canvas id="ref-canvas" style="display:none"></canvas>

<script>
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const S = {
  gen: 'gradient',
  w: 1200, h: 630,
  liveUpdate: true,
  showSafeZone: false,
  history: [],
  palette: [],
  composite: null,   // when set by AI, overrides single-generator render
  params: {
    gradient: { type:'linear', stops:['#6366f1','#ec4899','#06b6d4'], angle:135, radX:.5, radY:.5, cx:.5, cy:.5, opacity:1 },
    geometric: { type:'hex', size:48, gap:2, rotation:0, lineW:1.5, colorA:'#6366f1', colorB:'#0b0b10', opacity:.25, filled:false },
    noise: { type:'fbm', scale:4, octaves:5, turbulence:.5, colorA:'#1a1a2e', colorB:'#7c3aed', colorC:'#ec4899', opacity:1, seed:0 },
    flowfield: { type:'curl', count:2000, stepLen:3, lineW:1, speed:.8, colorA:'#6366f1', colorB:'#06b6d4', bg:'#050510', opacity:.7, seed:0 },
    material: { type:'glassmorphism', blur:12, opacity:.15, color:'#ffffff', tint:'#6366f1', grain:.08 },
  },
}

const canvas = document.getElementById('main-canvas')
const ctx    = canvas.getContext('2d')
const OC     = document.getElementById('overlay-canvas')
const octx   = OC.getContext('2d')

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
function hex2rgb(h){
  const s=h.replace('#','');
  const f=s.length===3?s.split('').map(c=>c+c).join(''):s;
  return{r:parseInt(f.slice(0,2),16),g:parseInt(f.slice(2,4),16),b:parseInt(f.slice(4,6),16)}
}
function rgb2hex(r,g,b){return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('')}
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,lo=0,hi=1){return Math.max(lo,Math.min(hi,v))}
function rand(lo,hi){return lo+Math.random()*(hi-lo)}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

// Contrast ratio for accessibility
function contrastRatio(fg, bg) {
  const lum = c => { const rgb = hex2rgb(c); const s = [rgb.r,rgb.g,rgb.b].map(v=>{v/=255;return v<=0.03928?v/12.92:((v+0.055)/1.055)**2.4}); return .2126*s[0]+.7152*s[1]+.0722*s[2] }
  const L1 = Math.max(lum(fg),lum(bg)), L2 = Math.min(lum(fg),lum(bg))
  return (L1+0.05)/(L2+0.05)
}

// Get average color from canvas region
function avgColor(imageData, x, y, w, h) {
  let r=0,g=0,b=0,n=0
  for(let py=y;py<y+h;py+=4) for(let px=x;px<x+w;px+=4){
    const i=(py*imageData.width+px)*4
    r+=imageData.data[i];g+=imageData.data[i+1];b+=imageData.data[i+2];n++
  }
  return {r:Math.round(r/n),g:Math.round(g/n),b:Math.round(b/n)}
}

// ─── GRADIENT ───────────────────────────────────────────────
function genGradient(c, w, h, p) {
  c.clearRect(0,0,w,h)
  const {type,stops,angle,radX,radY,cx,cy} = p

  if (type === 'linear') {
    const rad = angle * Math.PI/180
    const len = Math.sqrt(w*w+h*h)/2
    const grd = c.createLinearGradient(
      w/2 - Math.cos(rad)*len, h/2 - Math.sin(rad)*len,
      w/2 + Math.cos(rad)*len, h/2 + Math.sin(rad)*len
    )
    stops.forEach((s,i)=>grd.addColorStop(i/Math.max(stops.length-1,1), s))
    c.fillStyle = grd; c.fillRect(0,0,w,h)

  } else if (type === 'radial') {
    const grd = c.createRadialGradient(w*cx,h*cy,0, w*cx,h*cy, Math.sqrt(w*w+h*h)*.7)
    stops.forEach((s,i)=>grd.addColorStop(i/Math.max(stops.length-1,1), s))
    c.fillStyle = grd; c.fillRect(0,0,w,h)

  } else if (type === 'conic') {
    const STEPS = 360
    for(let i=0;i<STEPS;i++){
      const t = i/STEPS
      const a1 = t*Math.PI*2 - Math.PI/2
      const a2 = ((i+1)/STEPS)*Math.PI*2 - Math.PI/2
      c.beginPath(); c.moveTo(w*cx, h*cy)
      c.lineTo(w*cx+Math.cos(a1)*Math.sqrt(w*w+h*h), h*cy+Math.sin(a1)*Math.sqrt(w*w+h*h))
      c.lineTo(w*cx+Math.cos(a2)*Math.sqrt(w*w+h*h), h*cy+Math.sin(a2)*Math.sqrt(w*w+h*h))
      c.closePath()
      c.fillStyle = _interpStops(stops, t); c.fill()
    }

  } else if (type === 'mesh') {
    // mesh gradient: 4-corner radials blended with 'lighter'
    const corners = [
      {x:0, y:0, c:stops[0]||'#000'}, {x:w, y:0, c:stops[1]||'#000'},
      {x:0, y:h, c:stops[2]||'#000'}, {x:w, y:h, c:stops[3]||'#000'}
    ]
    c.fillStyle = stops[0]||'#000'; c.fillRect(0,0,w,h)
    c.save(); c.globalCompositeOperation = 'lighter'
    const r = Math.sqrt(w*w+h*h)
    corners.forEach(({x,y,c:col})=>{
      const {r:cr,g,b}=hex2rgb(col)
      const grd=c.createRadialGradient(x,y,0,x,y,r)
      grd.addColorStop(0,`rgba(${cr},${g},${b},.8)`)
      grd.addColorStop(1,`rgba(${cr},${g},${b},0)`)
      c.fillStyle=grd; c.fillRect(0,0,w,h)
    }); c.restore()

  } else if (type === 'aurora') {
    // dark base + multiple soft blobs
    c.fillStyle = stops[0]||'#050a14'; c.fillRect(0,0,w,h)
    const blobs = [
      {x:.25,y:.4,r:.55,c:stops[1]||'#00c6a7'},
      {x:.75,y:.6,r:.55,c:stops[2]||'#7c3aed'},
      {x:.5,y:.2,r:.45,c:stops[3]||'#06b6d4'},
    ]
    c.save(); c.globalCompositeOperation='screen'
    blobs.forEach(b=>{
      const {r:cr,g,b:cb}=hex2rgb(b.c)
      const grd=c.createRadialGradient(w*b.x,h*b.y,0,w*b.x,h*b.y,Math.sqrt(w*w+h*h)*b.r)
      grd.addColorStop(0,`rgba(${cr},${g},${cb},.35)`)
      grd.addColorStop(1,`rgba(${cr},${g},${cb},0)`)
      c.fillStyle=grd; c.fillRect(0,0,w,h)
    }); c.restore()
    _applyGrain(c,w,h,.04)
    _applyVignette(c,w,h,.6)
  }
}

function _interpStops(stops, t) {
  for(let i=0;i<stops.length-1;i++){
    const a=i/(stops.length-1), b=(i+1)/(stops.length-1)
    if(t>=a&&t<=b){
      const f=(t-a)/(b-a)
      const ca=hex2rgb(stops[i]),cb=hex2rgb(stops[i+1])
      return `rgb(${Math.round(lerp(ca.r,cb.r,f))},${Math.round(lerp(ca.g,cb.g,f))},${Math.round(lerp(ca.b,cb.b,f))})`
    }
  }
  return stops[stops.length-1]||'#fff'
}

function gradientToCSS(p) {
  const {type,stops,angle,cx,cy} = p
  const s = stops.map((c,i)=>`${c} ${Math.round(i/Math.max(stops.length-1,1)*100)}%`).join(', ')
  if(type==='linear') return `background: linear-gradient(${angle}deg, ${s});`
  if(type==='radial') return `background: radial-gradient(circle at ${Math.round(cx*100)}% ${Math.round(cy*100)}%, ${s});`
  if(type==='conic') return `background: conic-gradient(from 0deg at ${Math.round(cx*100)}% ${Math.round(cy*100)}%, ${s});`
  return `/* ${type} gradient — use PNG export */`
}

// ─── GEOMETRIC ──────────────────────────────────────────────
function genGeometric(c, w, h, p) {
  const {type,size,gap,rotation,lineW,colorA,colorB,filled} = p
  c.fillStyle = colorB; c.fillRect(0,0,w,h)
  c.strokeStyle = colorA; c.fillStyle = colorA
  c.lineWidth = lineW

  switch(type){
    case 'hex':        _geoHex(c,w,h,size,gap,filled); break
    case 'triangles':  _geoTriangles(c,w,h,size,filled); break
    case 'dots':       _geoDots(c,w,h,size,gap); break
    case 'stripes':    _geoStripes(c,w,h,size,rotation); break
    case 'chevron':    _geoChevron(c,w,h,size); break
    case 'houndstooth':_geoHoundstooth(c,w,h,size,colorA,colorB); break
    case 'plaid':      _geoPlaid(c,w,h,size,colorA,colorB); break
    case 'isogrid':    _geoIsoGrid(c,w,h,size); break
    case 'dotgrid':    _geoDotGrid(c,w,h,size,gap); break
    case 'moroccan':   _geoMoroccan(c,w,h,size,filled); break
    case 'islamic':    _geoIslamic(c,w,h,size,filled); break
    case 'truchet':    _geoTruchet(c,w,h,size); break
  }
}

function _geoHex(c,w,h,r,gap,filled){
  const a=r*2, ht=Math.sqrt(3)*r, cols=Math.ceil(w/(a*.75))+2, rows=Math.ceil(h/ht)+2
  for(let row=-1;row<rows;row++) for(let col=-1;col<cols;col++){
    const x=col*a*.75, y=row*ht+(col%2===0?0:ht/2)
    c.beginPath()
    for(let i=0;i<6;i++){const a2=Math.PI/3*i-Math.PI/6;const px=x+r*Math.cos(a2),py=y+r*Math.sin(a2);i===0?c.moveTo(px,py):c.lineTo(px,py)}
    c.closePath(); filled?c.fill():c.stroke()
  }
}
function _geoTriangles(c,w,h,s,filled){
  const ht=Math.sqrt(3)/2*s, rows=Math.ceil(h/ht)+2, cols=Math.ceil(w/s)+2
  for(let r=-1;r<rows;r++) for(let col=-1;col<cols;col++){
    const x=col*s-(r%2===0?0:s/2), y=r*ht
    c.beginPath(); c.moveTo(x,y+ht); c.lineTo(x+s/2,y); c.lineTo(x+s,y+ht); c.closePath()
    filled?c.fill():c.stroke()
  }
}
function _geoDots(c,w,h,s,g){
  const r=Math.max((s-g)/2*.45,1)
  for(let y=s/2;y<h+s;y+=s) for(let x=s/2;x<w+s;x+=s){
    c.beginPath(); c.arc(x,y,r,0,Math.PI*2); c.fill()
  }
}
function _geoStripes(c,w,h,s,angle){
  c.save(); c.translate(w/2,h/2); c.rotate(angle*Math.PI/180)
  const d=Math.sqrt(w*w+h*h)
  c.beginPath()
  for(let x=-d;x<d;x+=s*2){c.rect(x,-d,s,d*2)}
  c.fill(); c.restore()
}
function _geoChevron(c,w,h,s){
  const rows=Math.ceil(h/(s*.8))+2, cols=Math.ceil(w/s)+2
  c.beginPath()
  for(let r=-1;r<rows;r++) for(let col=-1;col<cols;col++){
    const x=col*s, y=r*s*.8
    c.moveTo(x,y+s*.4); c.lineTo(x+s/2,y); c.lineTo(x+s,y+s*.4)
    c.moveTo(x,y+s*.8); c.lineTo(x+s/2,y+s*.4); c.lineTo(x+s,y+s*.8)
  }
  c.stroke()
}
function _geoHoundstooth(c,w,h,s,ca,cb){
  const tile=document.createElement('canvas'); tile.width=s*2; tile.height=s*2
  const tc=tile.getContext('2d'); tc.fillStyle=ca; tc.fillRect(0,0,s*2,s*2)
  tc.fillStyle=cb
  const shapes=[[0,0,s,0,s/2,s/2],[s,0,s*2,0,s*2,s/2],[0,s,0,0,s/2,s/2],[s*2,s,s*2,0,s*2-s/2,s/2],[0,s,s/2,s/2,s,s],[s,s,s*2-s/2,s/2,s*2,s],[0,s*2,s,s*2,s/2,s*1.5],[s,s*2,s*2,s*2,s*2-s/2,s*1.5]]
  shapes.forEach(pts=>{tc.beginPath();tc.moveTo(pts[0],pts[1]);for(let i=2;i<pts.length;i+=2)tc.lineTo(pts[i],pts[i+1]);tc.closePath();tc.fill()})
  c.fillStyle=c.createPattern(tile,'repeat'); c.fillRect(0,0,w,h)
}
function _geoPlaid(c,w,h,s,ca,cb){
  const cols=['#fff',ca,cb,ca,'#fff']
  const widths=[s*.1,s*.3,s*.1,s*.3,s*.1]
  c.fillStyle=ca; c.fillRect(0,0,w,h)
  let x=0; for(let i=0;i<100&&x<w+s;i++){
    const wi=widths[i%widths.length]
    c.fillStyle=cols[i%cols.length]; c.globalAlpha=.6
    c.fillRect(x,0,wi,h); x+=wi
  }
  c.globalAlpha=1; let y=0; for(let i=0;i<100&&y<h+s;i++){
    const wi=widths[i%widths.length]
    c.fillStyle=cols[i%cols.length]; c.globalAlpha=.4
    c.fillRect(0,y,w,wi); y+=wi
  }
  c.globalAlpha=1
}
function _geoIsoGrid(c,w,h,s){
  const hs=s/2, vs=s*Math.sqrt(3)/2
  c.beginPath()
  for(let row=-2;row<Math.ceil(h/vs)+2;row++){
    for(let col=-2;col<Math.ceil(w/hs)+2;col++){
      const x=col*hs+(row%2===0?0:hs/2), y=row*vs
      c.moveTo(x,y); c.lineTo(x-hs/2,y+vs/2)
      c.moveTo(x,y); c.lineTo(x+hs/2,y+vs/2)
    }
  }
  c.stroke()
}
function _geoDotGrid(c,w,h,s,g){
  const r=Math.max(g/2,1)
  for(let y=0;y<h+s;y+=s) for(let x=0;x<w+s;x+=s){
    c.beginPath(); c.arc(x,y,r,0,Math.PI*2); c.fill()
  }
}
function _geoMoroccan(c,w,h,s,filled){
  const cols=Math.ceil(w/s)+2, rows=Math.ceil(h/s)+2
  for(let r=-1;r<rows;r++) for(let col=-1;col<cols;col++){
    const ox=(r%2===0?0:s/2), x=col*s+ox, y=r*s*.75
    c.save(); c.translate(x,y); c.beginPath()
    // simplified 8-pointed moroccan star
    for(let i=0;i<8;i++){
      const a=i*Math.PI/4; const a2=(i+.5)*Math.PI/4
      const r1=s*.45, r2=s*.22
      i===0?c.moveTo(Math.cos(a)*r1,Math.sin(a)*r1):c.lineTo(Math.cos(a)*r1,Math.sin(a)*r1)
      c.lineTo(Math.cos(a2)*r2,Math.sin(a2)*r2)
    }
    c.closePath(); filled?c.fill():c.stroke(); c.restore()
  }
}
function _geoIslamic(c,w,h,s,filled){
  const cols=Math.ceil(w/s)+2, rows=Math.ceil(h/s)+2
  for(let r=-1;r<rows;r++) for(let col=-1;col<cols;col++){
    const x=col*s, y=r*s
    c.save(); c.translate(x+s/2,y+s/2)
    // 12-pointed star
    for(let i=0;i<12;i++){
      const a=i*Math.PI/6; const a2=(i+.5)*Math.PI/6
      const r1=s*.48, r2=s*.2
      c.beginPath(); c.moveTo(Math.cos(a)*r1,Math.sin(a)*r1)
      c.lineTo(Math.cos(a2)*r2,Math.sin(a2)*r2)
      c.lineTo(Math.cos(a+Math.PI/6)*r1,Math.sin(a+Math.PI/6)*r1)
      c.closePath(); filled?c.fill():c.stroke()
    }
    c.restore()
  }
}
function _geoTruchet(c,w,h,s){
  const cols=Math.ceil(w/s)+1, rows=Math.ceil(h/s)+1
  for(let r=0;r<rows;r++) for(let col=0;col<cols;col++){
    const x=col*s, y=r*s
    const flip=_seededRand(col*1000+r*37+17)<.5
    c.beginPath()
    if(flip){
      c.arc(x,y,s/2,0,Math.PI/2)
      c.moveTo(x+s,y+s/2); c.arc(x+s,y+s,s/2,Math.PI,Math.PI*1.5)
    } else {
      c.arc(x+s,y,s/2,Math.PI/2,Math.PI)
      c.moveTo(x+s/2,y+s); c.arc(x,y+s,s/2,0,-Math.PI/2,true)
    }
    c.stroke()
  }
}
function _seededRand(seed){let x=Math.sin(seed+1)*10000;return x-Math.floor(x)}

// ─── NOISE & ORGANIC ────────────────────────────────────────
let _simplex = null
function getSimplex(){if(!_simplex&&window.SimplexNoise){try{_simplex=new window.SimplexNoise.SimplexNoise()}catch(e){_simplex={noise2D:(x,y)=>Math.sin(x*1.7+y*.9)*.5+.5}}}return _simplex}

function genNoise(c, w, h, p) {
  const {type,scale,octaves,colorA,colorB,colorC,opacity,seed} = p
  const sx=getSimplex()
  const ca=hex2rgb(colorA), cb=hex2rgb(colorB), cc=hex2rgb(colorC||colorB)
  const idata = c.createImageData(w,h)
  const d = idata.data
  const sc = scale/10
  const off = seed * 100

  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    const nx=(x/w)*sc*10+off, ny=(y/h)*sc*10+off
    let v=0

    if(type==='fbm'||type==='perlin'){
      let amp=.5, freq=1
      for(let o=0;o<octaves;o++){
        v+=sx?(sx.noise2D(nx*freq,ny*freq)*amp):Math.sin(nx*freq+ny*freq)*amp*.5
        amp*=.5; freq*=2
      }
      v=v*.5+.5
    } else if(type==='turbulence'){
      let amp=.5, freq=1
      for(let o=0;o<octaves;o++){
        const n=sx?sx.noise2D(nx*freq,ny*freq):Math.sin(nx*freq+ny*freq)*.5
        v+=Math.abs(n)*amp; amp*=.5; freq*=2
      }
      v=clamp(v)
    } else if(type==='marble'){
      let n=0, amp=.5, freq=1
      for(let o=0;o<octaves;o++){
        n+=sx?sx.noise2D(nx*freq,ny*freq)*amp:Math.sin(nx*freq+ny*freq)*amp*.5
        amp*=.5; freq*=2
      }
      v=Math.sin(nx*2+n*p.turbulence*8)*.5+.5
    } else if(type==='wood'){
      const n=(sx?sx.noise2D(nx,ny):Math.sin(nx+ny)*.5)*p.turbulence*3
      const rings=Math.sqrt((x/w-.5)**2+(y/h-.5)**2)*scale
      v=Math.sin((rings+n)*Math.PI*2)*.5+.5
    } else if(type==='fabric'){
      const wx=Math.sin(x*.15*sc*5)*.5+.5
      const wy=Math.sin(y*.15*sc*5+Math.PI/4)*.5+.5
      const n=sx?sx.noise2D(nx*.2,ny*.2)*.15:0
      v=clamp((wx+wy)*.5+n)
    } else if(type==='paper'){
      let n=0, amp=.5, freq=3
      for(let o=0;o<4;o++){
        n+=sx?sx.noise2D(nx*freq,ny*freq)*amp:Math.random()*amp
        amp*=.5; freq*=2.1
      }
      v=clamp(n*.3+.7)
    }

    const t = clamp(v)
    const t2 = t<.5 ? t*2 : (t-.5)*2
    const mid = t<.5 ? ca : cb
    const end = t<.5 ? cb : cc
    const i=(y*w+x)*4
    d[i  ]=Math.round(lerp(mid.r,end.r,t2))
    d[i+1]=Math.round(lerp(mid.g,end.g,t2))
    d[i+2]=Math.round(lerp(mid.b,end.b,t2))
    d[i+3]=Math.round(255*opacity)
  }
  const tmp=document.createElement('canvas'); tmp.width=w; tmp.height=h
  tmp.getContext('2d').putImageData(idata,0,0)
  c.save(); c.drawImage(tmp,0,0); c.restore()
}

// ─── FLOW FIELDS ────────────────────────────────────────────
function genFlowField(c, w, h, p) {
  const {type,count,stepLen,lineW,speed,colorA,colorB,bg,opacity,seed} = p
  c.fillStyle=bg; c.fillRect(0,0,w,h)
  const sx=getSimplex()
  const ca=hex2rgb(colorA), cb=hex2rgb(colorB)
  c.lineWidth=lineW
  const NS=seed*.1

  function angle(x,y){
    const nx=x/w*3, ny=y/h*3
    if(type==='curl'){
      const n1=sx?sx.noise2D(nx+NS,ny+NS):Math.sin(nx+ny+NS)
      const n2=sx?sx.noise2D(nx+.01+NS,ny+NS):Math.sin(nx+.01+ny+NS)
      return (n2-n1)*Math.PI*4
    } else if(type==='sine'){
      return Math.sin(nx*Math.PI)*Math.PI
    } else if(type==='radial'){
      return Math.atan2(y-h/2,x-w/2)+Math.PI/2
    } else {
      return (sx?sx.noise2D(nx+NS,ny+NS):Math.sin(nx+ny+NS))*Math.PI*2
    }
  }

  c.save(); c.globalAlpha=opacity
  for(let i=0;i<count;i++){
    let x=rand(0,w), y=rand(0,h)
    const t=i/count
    const r=Math.round(lerp(ca.r,cb.r,t)), g=Math.round(lerp(ca.g,cb.g,t)), b=Math.round(lerp(ca.b,cb.b,t))
    c.strokeStyle=`rgb(${r},${g},${b})`
    c.beginPath(); c.moveTo(x,y)
    for(let s=0;s<20;s++){
      const a=angle(x,y)
      x+=Math.cos(a)*stepLen*speed; y+=Math.sin(a)*stepLen*speed
      if(x<0||x>w||y<0||y>h) break
      c.lineTo(x,y)
    }
    c.stroke()
  }
  c.restore()
  _applyVignette(c,w,h,.5)
}

// ─── MATERIALS ──────────────────────────────────────────────
function genMaterial(c, w, h, p) {
  const {type} = p
  switch(type){
    case 'glassmorphism': _matGlass(c,w,h,p); break
    case 'carbon':        _matCarbon(c,w,h,p); break
    case 'brushed':       _matBrushed(c,w,h,p); break
    case 'bokeh':         _matBokeh(c,w,h,p); break
    case 'linen':         _matLinen(c,w,h,p); break
    case 'leather':       _matLeather(c,w,h,p); break
    case 'metal-mesh':    _matMetalMesh(c,w,h,p); break
  }
}
function _matGlass(c,w,h,p){
  // frosted glass: gradient bg + blur-ish noise overlay + border
  const g=c.createLinearGradient(0,0,w,h)
  const {r,g:gv,b}=hex2rgb(p.tint)
  g.addColorStop(0,`rgba(${r},${gv},${b},.8)`); g.addColorStop(1,`rgba(${r},${gv},${b},.3)`)
  c.fillStyle=g; c.fillRect(0,0,w,h)
  // noise overlay for frosted effect
  const idata=c.createImageData(w,h); const d=idata.d||idata.data
  for(let i=0;i<d.length;i+=4){d[i]=d[i+1]=d[i+2]=Math.random()*255;d[i+3]=Math.round(p.grain*40)}
  const tmp=document.createElement('canvas'); tmp.width=w; tmp.height=h
  tmp.getContext('2d').putImageData(idata,0,0)
  c.save(); c.globalCompositeOperation='overlay'; c.globalAlpha=.15; c.drawImage(tmp,0,0); c.restore()
  // inner border glow
  c.save(); c.strokeStyle=`rgba(255,255,255,${p.opacity})`; c.lineWidth=1.5
  c.strokeRect(1,1,w-2,h-2); c.restore()
  _applyGrain(c,w,h,p.grain)
}
function _matCarbon(c,w,h,p){
  const s=Math.max(p.blur||8,4)
  for(let y=0;y<h;y+=s) for(let x=0;x<w;x+=s){
    const v=(x+y)%(s*2)<s
    c.fillStyle=v?'#1a1a1a':'#222'; c.fillRect(x,y,s/2,s/2)
    c.fillStyle=v?'#222':'#1a1a1a'; c.fillRect(x+s/2,y,s/2,s/2)
    c.fillStyle=v?'#1a1a1a':'#2a2a2a'; c.fillRect(x,y+s/2,s/2,s/2)
    c.fillStyle=v?'#2a2a2a':'#1a1a1a'; c.fillRect(x+s/2,y+s/2,s/2,s/2)
  }
  // sheen
  const g=c.createLinearGradient(0,0,0,h)
  g.addColorStop(0,'rgba(255,255,255,.04)'); g.addColorStop(.5,'rgba(255,255,255,0)'); g.addColorStop(1,'rgba(0,0,0,.1)')
  c.fillStyle=g; c.fillRect(0,0,w,h)
}
function _matBrushed(c,w,h,p){
  const base=hex2rgb(p.color||'#888')
  c.fillStyle=`rgb(${base.r},${base.g},${base.b})`; c.fillRect(0,0,w,h)
  // horizontal brush strokes
  for(let y=0;y<h;y++){
    const v=Math.round(base.r+(Math.random()-.5)*20)
    c.strokeStyle=`rgba(${v},${v},${v},.08)`; c.lineWidth=1
    c.beginPath(); c.moveTo(0,y); c.lineTo(w,y); c.stroke()
  }
  // sheen gradient
  const g=c.createLinearGradient(0,0,w,h)
  g.addColorStop(0,'rgba(255,255,255,.12)'); g.addColorStop(.5,'rgba(255,255,255,0)'); g.addColorStop(1,'rgba(0,0,0,.08)')
  c.fillStyle=g; c.fillRect(0,0,w,h)
}
function _matBokeh(c,w,h,p){
  const bg=p.color||'#050510'; c.fillStyle=bg; c.fillRect(0,0,w,h)
  const {r,g:gv,b}=hex2rgb(p.tint||'#6366f1')
  for(let i=0;i<120;i++){
    const bx=rand(0,w), by=rand(0,h), br=rand(20,90), ba=rand(.03,.18)
    const gr=c.createRadialGradient(bx,by,0,bx,by,br)
    gr.addColorStop(0,`rgba(${r},${gv},${b},${ba})`)
    gr.addColorStop(1,`rgba(${r},${gv},${b},0)`)
    c.fillStyle=gr; c.fillRect(bx-br,by-br,br*2,br*2)
  }
  _applyGrain(c,w,h,.04)
  _applyVignette(c,w,h,.5)
}
function _matLinen(c,w,h,p){
  c.fillStyle=p.color||'#f5f0e8'; c.fillRect(0,0,w,h)
  // warp threads
  c.globalAlpha=.18
  for(let x=0;x<w;x+=2){c.strokeStyle=(x%4===0)?'#c8b89a':'#d4c4aa';c.lineWidth=1;c.beginPath();c.moveTo(x,0);c.lineTo(x,h);c.stroke()}
  // weft threads
  for(let y=0;y<h;y+=2){c.strokeStyle=(y%4===0)?'#c8b89a':'#d4c4aa';c.lineWidth=1;c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke()}
  c.globalAlpha=1; _applyGrain(c,w,h,.04)
}
function _matLeather(c,w,h,p){
  const base=p.color||'#4a3728'
  genNoise(c,w,h,{type:'turbulence',scale:5,octaves:4,turbulence:.6,colorA:base,colorB:'#2a1f16',colorC:'#6b4c38',opacity:1,seed:42})
  const g=c.createLinearGradient(0,0,w,h)
  g.addColorStop(0,'rgba(255,255,255,.05)'); g.addColorStop(1,'rgba(0,0,0,.2)')
  c.fillStyle=g; c.fillRect(0,0,w,h); _applyGrain(c,w,h,.05)
}
function _matMetalMesh(c,w,h,p){
  const s=p.blur||16
  c.fillStyle='#1a1a1a'; c.fillRect(0,0,w,h)
  c.strokeStyle='rgba(180,180,180,.4)'; c.lineWidth=.8
  // diagonal warp
  for(let x=-h;x<w+h;x+=s){c.beginPath();c.moveTo(x,0);c.lineTo(x+h,h);c.stroke()}
  // diagonal weft
  for(let x=-h;x<w+h;x+=s){c.beginPath();c.moveTo(x,0);c.lineTo(x-h,h);c.stroke()}
  // sheen
  const g=c.createLinearGradient(0,0,w,h)
  g.addColorStop(0,'rgba(255,255,255,.08)'); g.addColorStop(1,'rgba(0,0,0,.1)')
  c.fillStyle=g; c.fillRect(0,0,w,h)
}

// ─── SHARED EFFECTS ─────────────────────────────────────────
function _applyGrain(c,w,h,intensity){
  const tmp=document.createElement('canvas'); tmp.width=w; tmp.height=h
  const tc=tmp.getContext('2d'); const id=tc.createImageData(w,h)
  const d=id.data; for(let i=0;i<d.length;i+=4){const v=(Math.random()*2-1)*intensity*255;d[i]=d[i+1]=d[i+2]=Math.round(128+v);d[i+3]=Math.round(intensity*200)}
  tc.putImageData(id,0,0); c.save(); c.globalCompositeOperation='overlay'; c.drawImage(tmp,0,0); c.restore()
}
function _applyVignette(c,w,h,strength){
  const g=c.createRadialGradient(w/2,h/2,0,w/2,h/2,Math.sqrt(w*w+h*h)*.7)
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(.5,'rgba(0,0,0,0)'); g.addColorStop(1,`rgba(0,0,0,${strength})`)
  c.fillStyle=g; c.fillRect(0,0,w,h)
}

// ═══════════════════════════════════════════════════════════
// COMPOSITE RENDER ENGINE
// Stacks multiple visual layers — used by AI prompt engine
// ═══════════════════════════════════════════════════════════
function genComposite(c, w, h, layers) {
  for (const layer of layers) {
    const op = layer.opacity !== undefined ? layer.opacity : 1
    const blend = layer.blend || 'source-over'
    c.save()
    if (blend !== 'source-over') c.globalCompositeOperation = blend
    c.globalAlpha = op

    switch (layer.type) {

      case 'fill': {
        c.fillStyle = layer.color || '#000'
        c.fillRect(0, 0, w, h)
        break
      }

      case 'linearGrad': {
        const rad = (layer.angle || 135) * Math.PI / 180
        const len = Math.sqrt(w*w+h*h) / 2
        const g = c.createLinearGradient(
          w/2 - Math.cos(rad)*len, h/2 - Math.sin(rad)*len,
          w/2 + Math.cos(rad)*len, h/2 + Math.sin(rad)*len
        )
        ;(layer.stops||[]).forEach((s,i,a) => g.addColorStop(i/Math.max(a.length-1,1), s))
        c.fillStyle = g; c.fillRect(0,0,w,h)
        break
      }

      case 'radialGrad': {
        const cx2 = w*(layer.cx||.5), cy2 = h*(layer.cy||.4)
        const r2  = Math.sqrt(w*w+h*h) * (layer.r||.8)
        const g = c.createRadialGradient(cx2,cy2,0, cx2,cy2,r2)
        ;(layer.stops||[]).forEach((s,i,a) => g.addColorStop(i/Math.max(a.length-1,1), s))
        c.fillStyle = g; c.fillRect(0,0,w,h)
        break
      }

      case 'blobGlow': {
        for (const blob of (layer.blobs||[])) {
          const bx = w*blob.x, by = h*blob.y
          const br = Math.sqrt(w*w+h*h) * (blob.r||.4)
          const {r:cr,g:cg,b:cb} = hex2rgb(blob.color||'#6366f1')
          const ba = blob.alpha || 0.5
          const g = c.createRadialGradient(bx,by,0, bx,by,br)
          g.addColorStop(0,   `rgba(${cr},${cg},${cb},${ba})`)
          g.addColorStop(0.4, `rgba(${cr},${cg},${cb},${(ba*.45).toFixed(2)})`)
          g.addColorStop(1,   `rgba(${cr},${cg},${cb},0)`)
          c.fillStyle = g; c.fillRect(0,0,w,h)
        }
        break
      }

      case 'aurora': {
        // Wavy horizontal aurora bands
        const bands = layer.bands || []
        for (const band of bands) {
          const {r:cr,g:cg,b:cb} = hex2rgb(band.color||'#00c6a7')
          const by2 = h * (band.y||.5)
          const bh  = h * (band.height||.3)
          const g = c.createLinearGradient(0, by2-bh, 0, by2+bh)
          g.addColorStop(0, `rgba(${cr},${cg},${cb},0)`)
          g.addColorStop(.5,`rgba(${cr},${cg},${cb},${band.alpha||.35})`)
          g.addColorStop(1, `rgba(${cr},${cg},${cb},0)`)
          // wavy distortion via sinusoidal fill
          c.beginPath()
          const sx = getSimplex()
          const wave = band.wave || 0.08
          c.moveTo(0, by2 - bh)
          for (let px=0; px<=w; px+=4) {
            const wy = by2 + (sx ? sx.noise2D(px/w*3+band.seed||0, 0)*wave*h : 0)
            c.lineTo(px, wy - bh*.5)
          }
          for (let px=w; px>=0; px-=4) {
            const wy = by2 + (sx ? sx.noise2D(px/w*3+band.seed||0, 1)*wave*h : 0)
            c.lineTo(px, wy + bh*.5)
          }
          c.closePath()
          c.fillStyle = g; c.fill()
        }
        break
      }

      case 'noise2': {
        // Lightweight noise overlay (not full pixel render — uses tiled canvas for speed)
        const tmp2 = document.createElement('canvas')
        const ts = Math.min(256, w, h)
        tmp2.width = ts; tmp2.height = ts
        const tc2 = tmp2.getContext('2d')
        const id2 = tc2.createImageData(ts, ts)
        const d2 = id2.data
        const sx2 = getSimplex()
        const sc2 = (layer.scale||3)/10
        const ca2 = hex2rgb(layer.colorA||'#000'), cb2 = hex2rgb(layer.colorB||'#fff')
        const seed2 = layer.seed || 0
        for (let py=0; py<ts; py++) for (let px=0; px<ts; px++) {
          let v = 0, amp=.5, freq=1
          for (let o=0;o<(layer.octaves||4);o++) {
            v += (sx2 ? sx2.noise2D(px/ts*sc2*10*freq+seed2, py/ts*sc2*10*freq+seed2) : Math.sin(px*.1*freq+py*.1*freq))*.5 * amp
            amp*=.5; freq*=2
          }
          v = v*.5+.5
          const i2=(py*ts+px)*4
          d2[i2]  =Math.round(lerp(ca2.r,cb2.r,v))
          d2[i2+1]=Math.round(lerp(ca2.g,cb2.g,v))
          d2[i2+2]=Math.round(lerp(ca2.b,cb2.b,v))
          d2[i2+3]=255
        }
        tc2.putImageData(id2, 0, 0)
        // tile across canvas
        const pat = c.createPattern(tmp2, 'repeat')
        c.fillStyle = pat; c.fillRect(0,0,w,h)
        break
      }

      case 'grain2': {
        const tmp3 = document.createElement('canvas')
        tmp3.width = w; tmp3.height = h
        const tc3 = tmp3.getContext('2d')
        const id3 = tc3.createImageData(w,h); const d3=id3.data
        const gi = layer.intensity||.05
        for (let i=0;i<d3.length;i+=4){
          const v=(Math.random()*2-1)*gi*255
          d3[i]=d3[i+1]=d3[i+2]=Math.round(128+v); d3[i+3]=Math.round(gi*220)
        }
        tc3.putImageData(id3,0,0)
        c.save(); c.globalCompositeOperation='overlay'; c.drawImage(tmp3,0,0); c.restore()
        break
      }

      case 'vignette2': {
        const vs = layer.strength||.6
        const g = c.createRadialGradient(w/2,h/2,0, w/2,h/2, Math.sqrt(w*w+h*h)*.7)
        g.addColorStop(0,'rgba(0,0,0,0)')
        g.addColorStop(.45,'rgba(0,0,0,0)')
        g.addColorStop(1,`rgba(0,0,0,${vs})`)
        c.save(); c.globalAlpha=1; c.globalCompositeOperation='source-over'
        c.fillStyle=g; c.fillRect(0,0,w,h); c.restore()
        break
      }

      case 'bokeh2': {
        const {r:cr,g:cg,b:cb} = hex2rgb(layer.color||'#6366f1')
        for (let i=0;i<(layer.count||80);i++) {
          const bx=rand(0,w), by=rand(0,h), br=rand(layer.minR||15,layer.maxR||80), ba=rand(.015,layer.maxA||.14)
          const g = c.createRadialGradient(bx,by,0,bx,by,br)
          g.addColorStop(0,`rgba(${cr},${cg},${cb},${ba})`)
          g.addColorStop(1,`rgba(${cr},${cg},${cb},0)`)
          c.fillStyle=g; c.fillRect(bx-br,by-br,br*2,br*2)
        }
        break
      }

      case 'spotlight': {
        // directional cone of light
        const {r:cr,g:cg,b:cb} = hex2rgb(layer.color||'#ffffff')
        const sx3 = w*(layer.x||.5), sy3 = 0
        const sr = Math.sqrt(w*w+h*h)*(layer.r||.9)
        const g = c.createRadialGradient(sx3,sy3,0,sx3,sy3,sr)
        g.addColorStop(0, `rgba(${cr},${cg},${cb},${layer.alpha||.18})`)
        g.addColorStop(.4, `rgba(${cr},${cg},${cb},${(layer.alpha||.18)*.3})`)
        g.addColorStop(1, `rgba(${cr},${cg},${cb},0)`)
        c.fillStyle=g; c.fillRect(0,0,w,h)
        break
      }

      case 'scanlines2': {
        c.globalAlpha = layer.opacity||.08
        c.fillStyle = '#000'
        const sp = layer.spacing||3
        for(let y=0;y<h;y+=sp) c.fillRect(0,y,w,1)
        break
      }

      case 'geo2': {
        // Lightweight geometric overlay via existing engine
        const gp = { type:layer.geoType||'hex', size:layer.size||60, gap:2, rotation:0,
          lineW:1.2, colorA:layer.colorA||'#ffffff', colorB:'transparent',
          opacity:layer.geoOpacity||.08, filled:layer.filled||false }
        c.globalAlpha = layer.opacity||.08
        c.strokeStyle = layer.colorA||'rgba(255,255,255,.15)'
        c.fillStyle   = layer.colorA||'rgba(255,255,255,.15)'
        c.lineWidth = 1.2
        switch(layer.geoType||'hex'){
          case 'hex':     _geoHex(c,w,h,layer.size||60,2,false); break
          case 'dots':    _geoDots(c,w,h,layer.size||40,3); break
          case 'dotgrid': _geoDotGrid(c,w,h,layer.size||40,3); break
          case 'stripes': _geoStripes(c,w,h,layer.size||40,layer.angle||45); break
        }
        break
      }

      case 'chromatic': {
        // chromatic aberration via pixel shift
        const id4 = c.getImageData(0,0,w,h)
        const src = new Uint8ClampedArray(id4.data)
        const dst = id4.data
        const off3 = layer.offset||3
        for(let py=0;py<h;py++) for(let px=0;px<w;px++){
          const i=( py*w+px)*4
          const rx=Math.max(0,px-off3), ri=(py*w+rx)*4
          const bx=Math.min(w-1,px+off3), bi=(py*w+bx)*4
          dst[i]  = Math.round(dst[i]  *(1-(layer.amt||.5)) + src[ri]  *(layer.amt||.5))
          dst[i+2]= Math.round(dst[i+2]*(1-(layer.amt||.5)) + src[bi+2]*(layer.amt||.5))
        }
        c.putImageData(id4,0,0)
        break
      }
    }
    c.restore()
  }
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
let _renderTimer = null
function render(force=false){
  if(!force && !S.liveUpdate) return
  clearTimeout(_renderTimer)
  _renderTimer = setTimeout(()=>_doRender(), 16)
}

function _doRender(){
  const {w,h} = S
  canvas.width=w; canvas.height=h
  ctx.clearRect(0,0,w,h)

  // ── COMPOSITE MODE (AI-generated) ─────────────────────────
  if (S.composite && S.composite.layers) {
    genComposite(ctx, w, h, S.composite.layers)
    updateA11y(); updateCSSOutput(); fitCanvas(); _pushHistory()
    return
  }

  const p = S.params[S.gen]
  switch(S.gen){
    case 'gradient':  genGradient(ctx,w,h,p); break
    case 'geometric': genGeometric(ctx,w,h,p); break
    case 'noise':     genNoise(ctx,w,h,p); break
    case 'flowfield': genFlowField(ctx,w,h,p); break
    case 'material':  genMaterial(ctx,w,h,p); break
  }
  updateA11y()
  updateCSSOutput()
  fitCanvas()
  _pushHistory()
}

function _pushHistory(){
  const thumb = canvas.toDataURL('image/jpeg',.35)
  S.history.unshift({thumb, gen:S.gen, params:JSON.parse(JSON.stringify(S.params[S.gen]))})
  if(S.history.length>20) S.history.pop()
  renderHistory()
}

// ═══════════════════════════════════════════════════════════
// FIT CANVAS TO VIEWPORT
// ═══════════════════════════════════════════════════════════
function fitCanvas(){
  const area = document.getElementById('canvas-area')
  const aw = area.clientWidth - 40, ah = area.clientHeight - 80
  const scale = Math.min(aw/S.w, ah/S.h, 1)
  canvas.style.width  = Math.round(S.w * scale) + 'px'
  canvas.style.height = Math.round(S.h * scale) + 'px'
  OC.width = S.w; OC.height = S.h
  OC.style.width  = Math.round(S.w * scale) + 'px'
  OC.style.height = Math.round(S.h * scale) + 'px'
  if(S.showSafeZone) drawSafeZone()
}

// ═══════════════════════════════════════════════════════════
// SAFE ZONES
// ═══════════════════════════════════════════════════════════
function drawSafeZone(){
  const {w,h} = S
  octx.clearRect(0,0,w,h)
  octx.strokeStyle='rgba(255,255,255,.35)'
  octx.fillStyle='rgba(255,255,255,.07)'
  octx.lineWidth=1
  octx.setLineDash([4,4])
  // safe margins
  const mx=w*.08, my=h*.1
  octx.strokeRect(mx,my,w-mx*2,h-my*2)
  octx.fillRect(mx,my,w-mx*2,h-my*2)
  // center cross
  octx.beginPath(); octx.moveTo(w/2-20,h/2); octx.lineTo(w/2+20,h/2)
  octx.moveTo(w/2,h/2-20); octx.lineTo(w/2,h/2+20); octx.stroke()
  // labels
  octx.setLineDash([])
  octx.fillStyle='rgba(255,255,255,.7)'; octx.font='bold 11px sans-serif'
  octx.fillText('Safe Zone',mx+6,my+14)
  OC.style.display='block'
}

// ═══════════════════════════════════════════════════════════
// ACCESSIBILITY
// ═══════════════════════════════════════════════════════════
function updateA11y(){
  const area = document.getElementById('a11y-area')
  // sample center pixel
  const id = ctx.getImageData(S.w/2,S.h/2,1,1).data
  const bg = rgb2hex(id[0],id[1],id[2])
  const checks = [{fg:'#ffffff',label:'White text'},{fg:'#000000',label:'Black text'},{fg:'#6366f1',label:'Accent'}]
  area.innerHTML = checks.map(({fg,label})=>{
    const cr = contrastRatio(fg,bg); const r = Math.round(cr*10)/10
    const cls = cr>=7?'pass-aaa':cr>=4.5?'pass-aa':'fail'
    const grade = cr>=7?'AAA':cr>=4.5?'AA':'Fail'
    return `<div class="a11y-row"><div style="display:flex;align-items:center;gap:6px"><div class="a11y-swatch" style="background:${fg}"></div><span style="font-size:11.5px">${label}</span></div><span class="a11y-badge ${cls}">${grade} ${r}:1</span></div>`
  }).join('')
}

// ═══════════════════════════════════════════════════════════
// CSS OUTPUT
// ═══════════════════════════════════════════════════════════
function updateCSSOutput(){
  const el = document.getElementById('css-output')
  const wrap = el.closest?.('div') || el.parentElement
  if(S.composite){
    // In AI composite mode show the fill color as a base CSS hint
    const fill = S.composite.layers?.find(l=>l.type==='fill')
    el.textContent = fill
      ? `background-color: ${fill.color};\n/* AI composite — export as PNG for full fidelity */`
      : '/* AI composite — export as PNG */'
    return
  }
  let css = '/* export as PNG for this generator */'
  if(S.gen==='gradient') css = gradientToCSS(S.params.gradient)
  else if(S.gen==='geometric'){
    const {colorA,colorB} = S.params.geometric
    css = `background-color: ${colorB};\n/* pattern: use SVG export */`
  }
  el.textContent = css
}

// ═══════════════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════════════
function renderHistory(){
  const strip = document.getElementById('history-strip')
  strip.innerHTML = S.history.map((h,i)=>
    `<div class="hist-thumb" data-i="${i}" title="Restore"><img src="${h.thumb}" alt=""/></div>`
  ).join('')
  strip.querySelectorAll('.hist-thumb').forEach(el=>
    el.addEventListener('click',()=>{
      const entry = S.history[+el.dataset.i]
      S.gen = entry.gen
      S.params[entry.gen] = JSON.parse(JSON.stringify(entry.params))
      selectGen(entry.gen)
      render(true)
    })
  )
}

// ═══════════════════════════════════════════════════════════
// VARIATIONS
// ═══════════════════════════════════════════════════════════
function showVariations(){
  // Create a 3×3 grid of thumbs in a modal-like overlay
  const overlay = document.createElement('div')
  overlay.style.cssText='position:fixed;inset:0;background:#0009;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px'
  overlay.innerHTML='<div style="color:#fff;font-size:14px;font-weight:700;margin-bottom:4px">Variations — click to apply</div><div id="var-g" style="display:grid;grid-template-columns:repeat(3,180px);gap:8px"></div><button id="var-close" style="margin-top:8px;padding:6px 20px;border-radius:6px;border:1px solid #fff3;background:#1a1a2e;color:#fff;cursor:pointer;font-size:12px">✕ Close</button>'
  document.body.appendChild(overlay)
  overlay.querySelector('#var-close').onclick=()=>overlay.remove()
  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove() })

  const grid = overlay.querySelector('#var-g')
  for(let i=0;i<9;i++){
    const vc = document.createElement('canvas')
    vc.width=360; vc.height=200; vc.style.cssText='width:180px;height:100px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:border-color.15s'
    vc.addEventListener('mouseenter',()=>vc.style.borderColor='#6366f1')
    vc.addEventListener('mouseleave',()=>vc.style.borderColor='transparent')
    const vp = _randomVariation()
    const vctx = vc.getContext('2d')
    switch(S.gen){
      case 'gradient':  genGradient(vctx,360,200,vp); break
      case 'geometric': genGeometric(vctx,360,200,vp); break
      case 'noise':     genNoise(vctx,360,200,vp); break
      case 'flowfield': genFlowField(vctx,360,200,vp); break
      case 'material':  genMaterial(vctx,360,200,vp); break
    }
    vc.addEventListener('click',()=>{
      S.params[S.gen] = JSON.parse(JSON.stringify(vp))
      buildControls()
      render(true)
      overlay.remove()
    })
    grid.appendChild(vc)
  }
}

function _randomVariation(){
  const p = JSON.parse(JSON.stringify(S.params[S.gen]))
  // mutate numeric params randomly
  Object.keys(p).forEach(k=>{
    if(typeof p[k]==='number' && k!=='seed'){
      p[k] = clamp(p[k]*(0.6+Math.random()*.8), 0, k==='angle'?360:k==='count'?5000:k==='octaves'?8:k==='size'?200:1)
    } else if(typeof p[k]==='string' && p[k].startsWith('#')){
      p[k] = _randColor()
    }
  })
  if(Array.isArray(p.stops)) p.stops = p.stops.map(()=>_randColor())
  p.seed = Math.random()*1000
  return p
}
function _randColor(){ return '#'+[0,0,0].map(()=>Math.floor(Math.random()*256).toString(16).padStart(2,'0')).join('') }

  S.composite = null   // always clear composite so generator controls work

// ═══════════════════════════════════════════════════════════
// REFERENCE IMAGE ANALYSIS
// ═══════════════════════════════════════════════════════════
function analyzeImage(file){
  const reader = new FileReader()
  reader.onload = e => {
    const img = new Image()
    img.onload = () => {
      const rc = document.getElementById('ref-canvas')
      const SAMPLE = 150
      rc.width=SAMPLE; rc.height=SAMPLE
      const rx=rc.getContext('2d')
      rx.drawImage(img,0,0,SAMPLE,SAMPLE)
      const id = rx.getImageData(0,0,SAMPLE,SAMPLE)

      // Color extraction — grid sampling + k-means clustering (simplified)
      const colors = []
      for(let y=0;y<SAMPLE;y+=8) for(let x=0;x<SAMPLE;x+=8){
        const i=(y*SAMPLE+x)*4
        colors.push([id.data[i],id.data[i+1],id.data[i+2]])
      }
      const palette = _kMeans(colors, 7)
      S.palette = palette.map(([r,g,b])=>rgb2hex(Math.round(r),Math.round(g),Math.round(b)))

      // Brightness / contrast analysis
      let totalBright=0
      colors.forEach(([r,g,b])=>{totalBright+=.299*r+.587*g+.114*b})
      const avgBright = totalBright/colors.length/255

      // Edge detection (simplified — variance in local area)
      let edgeScore=0
      for(let y=1;y<SAMPLE-1;y++) for(let x=1;x<SAMPLE-1;x++){
        const gx=_getGray(id,SAMPLE,x+1,y)-_getGray(id,SAMPLE,x-1,y)
        const gy=_getGray(id,SAMPLE,x,y+1)-_getGray(id,SAMPLE,x,y-1)
        edgeScore+=Math.sqrt(gx*gx+gy*gy)
      }
      edgeScore /= (SAMPLE*SAMPLE)
      const isGeometric = edgeScore > 40
      const isSmooth    = edgeScore < 15

      // Detect dominant hue variance
      const hues = colors.map(([r,g,b])=>_rgb2hsl(r,g,b)[0])
      const hueVar = _variance(hues)
      const isColorful = hueVar > 2000

      // Suggest generator
      let suggestedGen='gradient', styleTag='Gradient'
      if(isGeometric){ suggestedGen='geometric'; styleTag='Geometric' }
      else if(!isSmooth&&isColorful){ suggestedGen='noise'; styleTag='Organic/Noise' }
      else if(isSmooth&&!isColorful){ suggestedGen='material'; styleTag='Material' }
      else if(isColorful){ suggestedGen='flowfield'; styleTag='Generative' }

      // Apply palette to current generator
      _applyPaletteToGen(suggestedGen, S.palette)
      S.gen = suggestedGen
      selectGen(suggestedGen)

      // Render the ref panel UI
      _renderRefPanel(S.palette, styleTag, avgBright)
      render(true)
      toast(`Analyzed! Detected: ${styleTag}`)
    }
    img.src = e.target.result
  }
  reader.readAsDataURL(file)
}

function _getGray(id,w,x,y){ const i=(y*w+x)*4; return .299*id.data[i]+.587*id.data[i+1]+.114*id.data[i+2] }
function _variance(arr){ const m=arr.reduce((a,b)=>a+b,0)/arr.length; return arr.reduce((a,v)=>a+(v-m)**2,0)/arr.length }
function _rgb2hsl(r,g,b){ r/=255;g/=255;b/=255; const max=Math.max(r,g,b),min=Math.min(r,g,b),l=(max+min)/2; let h=0,s=0; if(max!==min){const d=max-min;s=l>.5?d/(2-max-min):d/(max+min);switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;}h*=60} return[h,s,l] }

function _kMeans(pts, k) {
  let centers = pts.slice(0,k).map(p=>[...p])
  for(let iter=0;iter<15;iter++){
    const clusters = Array.from({length:k},()=>([]))
    pts.forEach(p=>{
      let best=0, bd=Infinity
      centers.forEach((c,i)=>{
        const d=(p[0]-c[0])**2+(p[1]-c[1])**2+(p[2]-c[2])**2
        if(d<bd){bd=d;best=i}
      })
      clusters[best].push(p)
    })
    centers = clusters.map(cl=>{
      if(!cl.length) return [rand(0,255),rand(0,255),rand(0,255)]
      return [cl.reduce((s,p)=>s+p[0],0)/cl.length, cl.reduce((s,p)=>s+p[1],0)/cl.length, cl.reduce((s,p)=>s+p[2],0)/cl.length]
    })
  }
  return centers
}

function _applyPaletteToGen(gen, palette){
  if(gen==='gradient') S.params.gradient.stops=palette.slice(0,3)
  else if(gen==='geometric'){S.params.geometric.colorA=palette[0];S.params.geometric.colorB=palette[palette.length-1]}
  else if(gen==='noise'){S.params.noise.colorA=palette[0];S.params.noise.colorB=palette[1]||palette[0];S.params.noise.colorC=palette[2]||palette[0]}
  else if(gen==='flowfield'){S.params.flowfield.colorA=palette[0];S.params.flowfield.colorB=palette[1]||palette[0];S.params.flowfield.bg=palette[palette.length-1]}
  else if(gen==='material'){S.params.material.tint=palette[0];S.params.material.color=palette[1]||'#ffffff'}
}

function _renderRefPanel(palette, styleTag, brightness){
  const area = document.getElementById('controls-area')
  const strip = palette.map((c,i)=>`<div class="pal-color" style="background:${c}" data-c="${c}" title="${c}"><span class="hex-tip">${c}</span></div>`).join('')
  const refHTML=`
    <div class="rp-section">
      <div class="rp-title">Detected Style</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span class="style-tag">⊕ ${styleTag}</span>
        <span style="font-size:11px;color:var(--muted)">Brightness: ${Math.round(brightness*100)}%</span>
      </div>
      <div class="rp-title">Extracted Palette</div>

      <div style="margin-top:10px;display:flex;gap:6px">

      </div>

    ${_buildControlsFor(S.gen)}

  area.innerHTML = refHTML
  _bindControls()
  area.querySelector('#ref-apply')?.addEventListener('click',()=>{

  })
  area.querySelectorAll('.pal-color').forEach(el=>{
    el.addEventListener('click',()=>{
      const c=el.dataset.c
      const p=S.params[S.gen]
      if(p.stops) p.stops[0]=c
      else if(p.colorA!==undefined) p.colorA=c
      buildControls(); render(true)
    })
  })
}

// BIND CONTROLS
// ═══════════════════════════════════════════════════════════
function _bindControls(){
  const area=document.getElementById('controls-area')

  // range sliders
  area.querySelectorAll('input[type=range]').forEach(el=>{
    el.addEventListener('input',()=>{
      const vid=el.id.replace('c_','v_')
      const vEl=document.getElementById(vid); if(vEl) vEl.textContent=el.value
      _mapControl(el.id, parseFloat(el.value))
      render()
    })
  })

  // color pickers
  area.querySelectorAll('input[type=color]').forEach(el=>{
    el.addEventListener('input',()=>{
      const tid='ct_'+el.id.slice(2)
      const txt=document.getElementById(tid); if(txt) txt.value=el.value
      _mapControl(el.id, el.value)
      render()
    })
  })

  // text hex inputs
  area.querySelectorAll('input[type=text]').forEach(el=>{
    el.addEventListener('input',()=>{
      const v=el.value.trim()
      if(/^#[0-9a-f]{6}$/i.test(v)){
        const cid='c_'+el.id.slice(3)
        const cp=document.getElementById(cid); if(cp) cp.value=v
        _mapControl(cid, v)
        render()
      }
    })
  })

  // selects
  area.querySelectorAll('select').forEach(el=>{
    el.addEventListener('change',()=>{
      _mapControl(el.id, el.value)
      buildControls()
      render(true)
    })
  })

  // toggles
  area.querySelectorAll('.toggle').forEach(el=>{
    el.addEventListener('click',()=>{
      el.classList.toggle('on')
      const key = el.id.replace('toggle_','')
      const p = S.params[S.gen]
      p[key] = el.classList.contains('on')
      render(true)
    })
  })

  // add/remove stop
  document.getElementById('addStop')?.addEventListener('click',()=>{
    S.params.gradient.stops.push(_randColor()); buildControls(); render(true)
  })
  document.getElementById('remStop')?.addEventListener('click',()=>{
    if(S.params.gradient.stops.length>2){ S.params.gradient.stops.pop(); buildControls(); render(true) }
  })

  // reference file
  document.getElementById('ref-file')?.addEventListener('change',e=>{
    if(e.target.files[0]) analyzeImage(e.target.files[0])
  })
  const drop=document.getElementById('ref-drop')
  if(drop){
    drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('drag')})
    drop.addEventListener('dragleave',()=>drop.classList.remove('drag'))
    drop.addEventListener('drop',e=>{
      e.preventDefault(); drop.classList.remove('drag')
      if(e.dataTransfer.files[0]) analyzeImage(e.dataTransfer.files[0])
    })
  }

  // inject preset thumbs if presets view
  const scripts=area.querySelectorAll('script')
  scripts.forEach(s=>{
    try{ eval(s.textContent) } catch(e){}
  })
}

function _mapControl(id, val){
  const p = S.params[S.gen]
  const map = {
    // gradient
    c_grad_type:'type',c_grad_angle:'angle',c_grad_cx:'cx',c_grad_cy:'cy',
    c_stop0:'stops.0',c_stop1:'stops.1',c_stop2:'stops.2',c_stop3:'stops.3',c_stop4:'stops.4',
    // geometric
    c_geo_type:'type',c_geo_size:'size',c_geo_gap:'gap',c_geo_rot:'rotation',
    c_geo_lw:'lineW',c_geo_op:'opacity',c_geo_ca:'colorA',c_geo_cb:'colorB',
    // noise
    c_noise_type:'type',c_noise_scale:'scale',c_noise_oct:'octaves',
    c_noise_turb:'turbulence',c_noise_op:'opacity',c_noise_seed:'seed',
    c_noise_ca:'colorA',c_noise_cb:'colorB',c_noise_cc:'colorC',
    // flowfield
    c_ff_type:'type',c_ff_count:'count',c_ff_step:'stepLen',c_ff_lw:'lineW',
    c_ff_speed:'speed',c_ff_op:'opacity',c_ff_seed:'seed',
    c_ff_bg:'bg',c_ff_ca:'colorA',c_ff_cb:'colorB',
    // material
    c_mat_type:'type',c_mat_blur:'blur',c_mat_op:'opacity',c_mat_grain:'grain',
    c_mat_col:'color',c_mat_tint:'tint',
  }
  const path = map[id]; if(!path) return
  if(path.startsWith('stops.')){
    const idx=+path.split('.')[1]; if(!p.stops) p.stops=[]
    p.stops[idx]=val
  } else {
    p[path]=val
  }
}

// EXPORT
// ═══════════════════════════════════════════════════════════
function exportPNG(){
  const a=document.createElement('a'); a.href=canvas.toDataURL('image/png')
  a.download=`texture-${S.gen}-${Date.now()}.png`; a.click(); toast('PNG downloaded!')
